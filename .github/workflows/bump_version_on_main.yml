name: Bump version on main

on:
  push:
    branches:
      - main
    paths:
      - "server/**"
      - "clients/**"
      - "!clients/apps/app/**"
      - ".github/workflows/bump_version_on_main.yml"
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write

jobs:
  bump-version:
    runs-on: ubuntu-24.04
    if: github.actor != 'n0-actions[bot]'

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main
          token: ${{ steps.app-token.outputs.token }}

      - name: Configure git
        run: |
          git config user.name "solei-bot[bot]"
          git config user.email "solei-bot[bot]@users.noreply.github.com"

      - name: Detect changed components
        id: changes
        run: |
          BASE="${{ github.event.before }}"
          HEAD="${{ github.sha }}"

          if [[ -z "$BASE" || "$BASE" == "0000000000000000000000000000000000000000" ]]; then
            BASE="$(git rev-list --max-parents=0 "$HEAD")"
          fi

          CHANGED=$(git diff --name-only "$BASE" "$HEAD")
          if echo "$CHANGED" | grep -q '^server/'; then
            echo "api_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "api_changed=false" >> "$GITHUB_OUTPUT"
          fi
          if echo "$CHANGED" | grep -q '^clients/' && ! echo "$CHANGED" | grep -q '^clients/apps/app/'; then
            echo "web_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "web_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump versions
        if: steps.changes.outputs.api_changed == 'true' || steps.changes.outputs.web_changed == 'true'
        id: bump
        run: |
          chmod +x .github/scripts/bump-version.sh
          api_version=""
          web_version=""

          if [[ "${{ steps.changes.outputs.api_changed }}" == "true" ]]; then
            api_version=$(.github/scripts/bump-version.sh api)
          fi

          if [[ "${{ steps.changes.outputs.web_changed }}" == "true" ]]; then
            web_version=$(.github/scripts/bump-version.sh web)
          fi

          echo "api_version=${api_version}" >> "$GITHUB_OUTPUT"
          echo "web_version=${web_version}" >> "$GITHUB_OUTPUT"

      - name: Commit and push version bump
        if: steps.changes.outputs.api_changed == 'true' || steps.changes.outputs.web_changed == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git add VERSION
          git commit -m "chore(release): bump versions"
          git push origin main
