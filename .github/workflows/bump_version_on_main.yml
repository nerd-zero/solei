name: Bump version on main

on:
  push:
    branches:
      - main
    paths:
      - "server/**"
      - "clients/**"
      - "!clients/apps/app/**"
      - ".github/workflows/bump_version_on_main.yml"
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write

jobs:
  bump-version:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Detect changed components
        id: changes
        run: |
          BASE="${{ github.event.before }}"
          HEAD="${{ github.sha }}"

          if [[ -z "$BASE" || "$BASE" == "0000000000000000000000000000000000000000" ]]; then
            BASE="$(git rev-list --max-parents=0 "$HEAD")"
          fi

          CHANGED=$(git diff --name-only "$BASE" "$HEAD")
          if echo "$CHANGED" | grep -q '^server/'; then
            echo "api_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "api_changed=false" >> "$GITHUB_OUTPUT"
          fi
          if echo "$CHANGED" | grep -q '^clients/'; then
            echo "web_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "web_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump versions
        if: steps.changes.outputs.api_changed == 'true' || steps.changes.outputs.web_changed == 'true'
        id: bump
        run: |
          chmod +x .github/scripts/bump-version.sh
          api_version=""
          web_version=""

          if [[ "${{ steps.changes.outputs.api_changed }}" == "true" ]]; then
            api_version=$(.github/scripts/bump-version.sh api)
          fi

          if [[ "${{ steps.changes.outputs.web_changed }}" == "true" ]]; then
            web_version=$(.github/scripts/bump-version.sh web)
          fi

          echo "api_version=${api_version}" >> "$GITHUB_OUTPUT"
          echo "web_version=${web_version}" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.changes.outputs.api_changed == 'true' || steps.changes.outputs.web_changed == 'true'
        run: |
          if git diff --quiet; then
            echo "No version changes to commit."
            exit 0
          fi

          git add VERSION

          MSG="chore(release): bump versions"
          if [[ -n "${{ steps.bump.outputs.api_version }}" && -n "${{ steps.bump.outputs.web_version }}" ]]; then
            MSG="chore(release): bump api to ${{ steps.bump.outputs.api_version }}, web to ${{ steps.bump.outputs.web_version }}"
          elif [[ -n "${{ steps.bump.outputs.api_version }}" ]]; then
            MSG="chore(release): bump api to ${{ steps.bump.outputs.api_version }}"
          elif [[ -n "${{ steps.bump.outputs.web_version }}" ]]; then
            MSG="chore(release): bump web to ${{ steps.bump.outputs.web_version }}"
          fi

          git commit -m "$MSG"
          git push origin HEAD:main
