name: Build & Publish Images

on:
  push:
    branches: ["main"]
    paths:
      - "VERSION"
      - ".github/workflows/build.yml"
  workflow_dispatch:

jobs:
  prepare:
    name: "Prepare 🔧"
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      api_version: ${{ steps.version.outputs.api_version }}
      web_version: ${{ steps.version.outputs.web_version }}
      server-changed: ${{ steps.changes.outputs.server_changed }}
      web-changed: ${{ steps.changes.outputs.web_changed }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            server:
              - 'server/**'
              - '.github/workflows/build.yml'
            web:
              - 'clients/**'
              - '!clients/apps/app/**'
              - '.github/workflows/build.yml'

      - name: Derive changed components
        id: changes
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "server_changed=true" >> "$GITHUB_OUTPUT"
            echo "web_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BASE="${{ github.event.before }}"
          HEAD="${{ github.sha }}"

          if [[ -z "$BASE" || "$BASE" == "0000000000000000000000000000000000000000" ]]; then
            BASE="$(git rev-list --max-parents=0 "$HEAD")"
          fi

          VERSION_DIFF=$(git diff --unified=0 "$BASE" "$HEAD" -- VERSION || true)

          server_changed="${{ steps.filter.outputs.server }}"
          web_changed="${{ steps.filter.outputs.web }}"

          if echo "$VERSION_DIFF" | grep -q '^[-+].*api='; then
            server_changed=true
          fi
          if echo "$VERSION_DIFF" | grep -q '^[-+].*web='; then
            web_changed=true
          fi

          echo "server_changed=$server_changed" >> "$GITHUB_OUTPUT"
          echo "web_changed=$web_changed" >> "$GITHUB_OUTPUT"

      - name: Compute version tag
        id: version
        run: |
          # Main: read versions from VERSION file + alpha suffix
          API_VERSION=$(grep '^api=' VERSION | cut -d= -f2 | tr -d '[:space:]')
          WEB_VERSION=$(grep '^web=' VERSION | cut -d= -f2 | tr -d '[:space:]')
          echo "api_version=${API_VERSION}-alpha" >> "$GITHUB_OUTPUT"
          echo "web_version=${WEB_VERSION}-alpha" >> "$GITHUB_OUTPUT"

  build-server:
    name: "Server: Build Image 🐳"
    needs: prepare
    if: needs.prepare.outputs.server-changed == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          push: true
          context: ./server
          target: production
          platforms: linux/amd64
          tags: |
            ghcr.io/nerd-zero/solei:${{ needs.prepare.outputs.api_version }}
            ghcr.io/nerd-zero/solei:latest
          build-args: |
            RELEASE_VERSION=${{ needs.prepare.outputs.api_version }}
          secrets: |
            IPINFO_ACCESS_TOKEN=${{ secrets.IPINFO_ACCESS_TOKEN }}

  build-web:
    name: "Web: Build Image 🐳"
    needs: prepare
    if: needs.prepare.outputs.web-changed == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          push: true
          context: ./clients
          file: ./clients/apps/web/Dockerfile
          platforms: linux/amd64
          tags: |
            ghcr.io/nerd-zero/solei-web:${{ needs.prepare.outputs.web_version }}
            ghcr.io/nerd-zero/solei-web:latest
          build-args: |
            RELEASE_VERSION=${{ needs.prepare.outputs.web_version }}
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL || 'https://dev-api.solei.to' }}
            NEXT_PUBLIC_FRONTEND_BASE_URL=${{ vars.NEXT_PUBLIC_FRONTEND_BASE_URL || 'https://dev.solei.to' }}
            NEXT_PUBLIC_BACKOFFICE_URL=${{ vars.NEXT_PUBLIC_BACKOFFICE_URL || 'https://dev-api.solei.to/backoffice' }}
            NEXT_PUBLIC_STRIPE_KEY=${{ vars.NEXT_PUBLIC_STRIPE_KEY || '' }}
            NEXT_PUBLIC_GITHUB_APP_NAMESPACE=${{ vars.NEXT_PUBLIC_GITHUB_APP_NAMESPACE || '' }}
            NEXT_PUBLIC_APPLE_DOMAIN_ASSOCIATION=${{ vars.NEXT_PUBLIC_APPLE_DOMAIN_ASSOCIATION || '' }}
          secrets: |
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}

  deploy:
    name: "Deploy 🚀"
    needs: [prepare, build-server, build-web]
    if: |
      always() &&
      !failure() &&
      !cancelled() &&
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    steps:
      - name: Deploy to self-hosted servers
        run: |
          echo "TODO: wire up deployment to self-hosted servers"
          echo "Server image: ghcr.io/nerd-zero/solei:${{ needs.prepare.outputs.api_version }}"
          echo "Web image:    ghcr.io/nerd-zero/solei-web:${{ needs.prepare.outputs.web_version }}"
