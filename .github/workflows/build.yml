name: Build & Publish Images

on:
  push:
    branches: ["main"]
    paths:
      - "server/**"
      - "clients/**"
      - "!clients/apps/app/**"
      - "VERSION"
      - ".github/workflows/build.yml"
  workflow_dispatch:

jobs:
  prepare:
    name: "Prepare 🔧"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
      server-changed: ${{ steps.filter.outputs.server }}
      web-changed: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            server:
              - 'server/**'
              - '.github/workflows/build.yml'
            web:
              - 'clients/**'
              - '!clients/apps/app/**'
              - '.github/workflows/build.yml'

      - name: Compute version tag
        id: version
        run: |
          # Main: read version from VERSION file + alpha suffix
          echo "version=$(cat VERSION | tr -d '[:space:]')-alpha" >> "$GITHUB_OUTPUT"

  build-server:
    name: "Server: Build Image 🐳"
    needs: prepare
    if: needs.prepare.outputs.server-changed == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          push: true
          context: ./server
          target: production
          platforms: linux/amd64
          tags: ghcr.io/nerd-zero/solei:${{ needs.prepare.outputs.version }}
          build-args: |
            RELEASE_VERSION=${{ needs.prepare.outputs.version }}
          secrets: |
            IPINFO_ACCESS_TOKEN=${{ secrets.IPINFO_ACCESS_TOKEN }}

  build-web:
    name: "Web: Build Image 🐳"
    needs: prepare
    if: needs.prepare.outputs.web-changed == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          push: true
          context: ./clients
          file: ./clients/apps/web/Dockerfile
          platforms: linux/amd64
          tags: ghcr.io/nerd-zero/solei-web:${{ needs.prepare.outputs.version }}
          build-args: |
            RELEASE_VERSION=${{ needs.prepare.outputs.version }}
          secrets: |
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}

  deploy:
    name: "Deploy 🚀"
    needs: [prepare, build-server, build-web]
    if: |
      always() &&
      !failure() &&
      !cancelled() &&
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to self-hosted servers
        run: |
          echo "TODO: wire up deployment to self-hosted servers"
          echo "Server image: ghcr.io/nerd-zero/solei:${{ needs.prepare.outputs.version }}"
          echo "Web image:    ghcr.io/nerd-zero/solei-web:${{ needs.prepare.outputs.version }}"
